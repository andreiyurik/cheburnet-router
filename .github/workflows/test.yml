name: test

on:
  push:
    branches: [master]
  pull_request:
  # Ручной запуск из вкладки Actions — для отладки QEMU-job'ов и release-gates.
  workflow_dispatch:

jobs:
  # ── T3a-v2: hermetic VM smoke ДВИЖКА v2 (ucode) ─────────────────────────────
  # Главный «живой» гейт v2: ucode-handler через rpcd, 13 ubus-методов, граница
  # доверия, NAT-зона + nft + teardown на реальном fw4, rootpass + session.login.
  # Интернет НЕ нужен (движок кладётся через ssh+cat, apk не зовётся). ~2 мин с KVM.
  qemu-v2-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + ncat
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              qemu-system-x86 qemu-utils ncat python3
          qemu-system-x86_64 --version | head -1

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm 2>/dev/null || echo "(KVM недоступен — ожидаем TCG-fallback)"

      - name: T3a-v2 — hermetic VM smoke движка v2
        run: make qemu-v2

      - name: Upload serial-лог при падении
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-v2-serial-log
          path: tests/qemu/.work/serial.log
          retention-days: 7

  # ── T3c-v2: install зависимостей через apk + data-plane против РЕАЛЬНЫХ сервисов
  # Единственная проверка DEPENDS пакета и DoH/DNS-провайдера на живом
  # https-dns-proxy. Нужен интернет (apk update/add). Release-gate, не PR-gate.
  qemu-install-v2:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: qemu-v2-smoke
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + ncat
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              qemu-system-x86 qemu-utils ncat python3
          qemu-system-x86_64 --version | head -1

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm 2>/dev/null || echo "(KVM недоступен — ожидаем TCG-fallback)"

      - name: T3c-v2 — DEPENDS + data-plane на реальных сервисах
        run: make qemu-install-v2

      - name: Upload install-лог при падении
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-install-v2-logs
          path: |
            tests/qemu/.work/serial.log
            /tmp/install-test*.log
          retention-days: 7
