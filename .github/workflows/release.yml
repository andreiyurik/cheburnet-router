name: release

# Публикация пакета cheburnet в GitHub Releases по git-тегу `v*`.
#
# Дистрибуция v2 (см. docs/v2/architecture/bootstrap.md + bootstrap/bootstrap.sh):
#   - cheburnet — PKGARCH=all (ucode+shell+web), поэтому ОДИН arch-независимый .apk на всех.
#     Собираем один раз, кладём ассетом в Release. bootstrap качает его напрямую
#     (releases/latest/download/…) — нам не нужен хостинг feed-индекса.
#   - kmod-amneziawg (arch/ядро-зависимый) НЕ здесь: его ставит bootstrap из awg-openwrt.
#
# Пакет НЕ подписываем: apk-tools 3 доверяет пакетам только через подписанный индекс репозитория
# (APKINDEX), а не через подпись отдельного файла — `apk add ./cheburnet.apk` всё равно был бы
# "untrusted" (проверено живьём на GL-MT3000, даже стоковый пакет OpenWrt так же). Раздаём один
# arch-независимый .apk, а не репозиторий, поэтому bootstrap ставит его `--allow-untrusted`;
# аутентичность = HTTPS с этого Release (тот же уровень, что и unsigned kmod из awg-openwrt).
# Настоящий подписанный feed (свой APKINDEX на GitHub Pages) — возможная будущая фаза.
#
# Публикация Release — ТОЛЬКО по push тега v*. workflow_dispatch = всегда dry-run (сборка +
# артефакты, без Release): безопасно гонять для проверки SDK-раскладки на любой ветке.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # нужно для создания Release и загрузки ассетов

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # OpenWrt SDK (apk-ветка 25.12) собирает пакет. ARCH задаёт SDK-контейнер; для PKGARCH=all
      # любой один arch даёт тот же arch-независимый .apk — берём x86_64/25.12.
      # Экшен запинен на SHA: job имеет contents:write, mutable @main здесь недопустим.
      - name: Build cheburnet via OpenWrt SDK
        uses: openwrt/gh-action-sdk@797d0e3d0eb13b355c3447f60d0179d4b43089e2
        env:
          ARCH: x86_64-25.12.0        # ← при первом прогоне сверить с доступным тегом ghcr SDK
          FEEDNAME: cheburnet
          PACKAGES: cheburnet
          V: s
          # Подпись НЕ включаем (PRIVATE_KEY не задаём): для раздачи одиночным .apk она
          # бесполезна — apk доверяет только подписанному индексу репо, не файлу (см. шапку).

      # Находим собранный .apk и нормализуем имя до cheburnet.apk (стабильный ассет для bootstrap).
      - name: Collect package
        id: collect
        run: |
          set -eu
          APK="$(find bin/packages -name 'cheburnet*.apk' | head -n1)"
          [ -n "$APK" ] || { echo "::error::cheburnet .apk не найден в bin/packages"; \
                             find bin/packages -type f | head -50; exit 1; }
          mkdir -p dist
          cp "$APK" dist/cheburnet.apk
          ls -l dist/
          echo "apk=dist/cheburnet.apk" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cheburnet-package
          path: dist/*
          retention-days: 14

      # Публикуем Release ТОЛЬКО на push тега: workflow_dispatch (даже на теге) — всегда dry-run.
      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cheburnet.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
