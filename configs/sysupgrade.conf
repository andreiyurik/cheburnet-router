## This file contains files and directories that should
## be preserved during an upgrade.

## === Основные скрипты управления (не из apk, будут стёрты при sysupgrade) ===
## Поддерживаем синхрон со списком /usr/bin/* в setup/manifest.txt —
## если файл там есть, он должен быть и здесь, иначе sysupgrade его стирает,
## а соответствующие cron-задачи начинают молча no-op'ить.
/usr/bin/vpn-mode
/usr/bin/dns-provider
/usr/bin/dns-healthcheck
/usr/bin/awg-watchdog
/usr/bin/conntrack-monitor
/usr/bin/conntrack-tune
/usr/bin/log-snapshot
/usr/bin/net-benchmark
/usr/bin/sqm-tune

## === Hotplug (кастомные) ===
/etc/hotplug.d/iface/30-adblock

## === AWG: КРИТИЧНО — содержит приватный ключ ===
/etc/amnezia/

## === Настройки adblock-lean (блок-листы перекачиваются заново) ===
/etc/adblock-lean/

## === Кастомные sysctl (conntrack тайм-ауты) ===
/etc/sysctl.conf

## === SSH (host-keys + authorized_keys) — не во всех OpenWrt-форках в default keep-list ===
/etc/dropbear/
